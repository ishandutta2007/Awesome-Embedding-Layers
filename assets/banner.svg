<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8e2de2;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
        </linearGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        </pattern>
    </defs>
    <rect width="800" height="200" fill="url(#grad1)" rx="15" ry="15"/>
    <rect width="800" height="200" fill="url(#grid)" rx="15" ry="15"/>
    
    <!-- Dynamic animated nodes -->
    <circle cx="150" cy="100" r="8" fill="#00f2fe">
        <animate attributeName="r" values="8;15;8" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="50" r="6" fill="#4facfe">
        <animate attributeName="cy" values="50;60;50" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="350" cy="150" r="10" fill="#f093fb">
        <animate attributeName="cx" values="350;360;350" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <!-- Lines connecting nodes (simulating neural net/embeddings) -->
    <path d="M 150 100 Q 200 50 250 50 T 350 150" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="5,5">
        <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    
    <!-- Title Text -->
    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff">
        Awesome Embedding Layers
        <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
    </text>
    <text x="50%" y="75%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0">
        History, Progression, Variants, &amp; Applications
    </text>
</svg>